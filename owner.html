<!doctype html>
<html>
  <head>
    <title>Owner Dashboard</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        padding: 20px;
      }

      h1 {
        color: #ff6b00;
        text-align: center;
      }

      #login-section {
        text-align: center;
        margin-bottom: 30px;
      }

      #owner-recipes {
        display: none;
        max-width: 900px;
        margin: auto;
      }

      .recipe-card {
        background: white;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      }

      .recipe-card img {
        width: 150px;
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .recipe-card h3 {
        margin: 5px 0;
        color: #ff6b00;
      }

      button {
        padding: 8px 14px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 5px;
      }

      .add-btn {
        background: #28a745;
        color: white;
      }

      .delete-btn {
        background: #dc3545;
        color: white;
      }

      .price-input {
        padding: 6px;
        width: 120px;
        margin-top: 8px;
      }
    </style>
  </head>

  <body>
    <h1>🔒 Owner Dashboard</h1>

    <div id="login-section">
      <input type="password" id="owner-pass" placeholder="Enter password" />
      <button onclick="loginOwner()">Login</button>

      <p id="login-msg"></p>
    </div>

    <div id="owner-recipes">
      <h2>Recipes With Rating ≥ 4 ⭐</h2>

      <div id="recipes-list"></div>
    </div>

    <script>
      const PASSWORD = "admin123";

      function loginOwner() {
        const pass = document.getElementById("owner-pass").value;

        if (pass === PASSWORD) {
          document.getElementById("login-section").style.display = "none";

          document.getElementById("owner-recipes").style.display = "block";

          loadOwnerRecipes();
        } else {
          document.getElementById("login-msg").innerText = "Wrong password";
        }
      }

      async function loadOwnerRecipes() {
        try {
          const res = await fetch("http://localhost:3000/recipes");

          const recipes = await res.json();

          const list = document.getElementById("recipes-list");

          list.innerHTML = "";

          const filtered = recipes.filter((r) => r.averageRating >= 4);

          if (filtered.length === 0) {
            list.innerHTML = "<p>No recipes rated 4⭐ yet</p>";
            return;
          }

          filtered.forEach((r) => {
            const card = document.createElement("div");

            card.className = "recipe-card";

           card.innerHTML = `

<img src="${r.image ? 'http://localhost:3000' + r.image : 'assets/setdefault.png'}" width="150">

<h3>${r.name}</h3>


<p><b>Submitted by:</b> ${r.yourname || 'Anonymous'}</p>

<p><b>Category:</b> ${r.category}</p>
<p><b>Status:</b> ${r.menu ? "Added To Menu" : "Pending"}</p>
<p><b>Rating:</b> ${r.averageRating.toFixed(1)} ⭐</p>
<p><b>Ingredients:</b> ${r.ingredients}</p>
<p><b>Steps:</b> ${r.steps}</p>


${r.menu ? `
<p style="color:green;font-weight:bold;">✅ Already Added To Menu</p>
<p><b>Price:</b> ₹${r.price}</p>
` : `
<input class="price-input" type="number" id="price-${r._id}" placeholder="Enter price ₹">

<br>

<button class="add-btn" onclick="addToMenu('${r._id}')">
Add To Menu
</button>
`}

<button class="delete-btn" onclick="deleteRecipe('${r._id}')">
Delete
</button>

`;
            list.appendChild(card);
          });
        } catch (err) {
          console.error(err);
        }
      }

      async function addToMenu(id) {
        const price = document.getElementById(`price-${id}`).value;

        if (!price) {
          alert("Please enter price first");

          return;
        }

        try {
          const res = await fetch(`http://localhost:3000/recipes/${id}/menu`, {
            method: "PUT",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({ price }),
          });

          const data = await res.json();

          alert(data.message);

          loadOwnerRecipes();
        } catch (err) {
          console.error(err);
        }
      }

      async function deleteRecipe(id) {
        if (!confirm("Delete this recipe?")) return;

        try {
          const res = await fetch(`http://localhost:3000/recipes/${id}`, {
            method: "DELETE",
          });

          const data = await res.json();

          alert(data.message);

          loadOwnerRecipes();
        } catch (err) {
          console.error(err);
        }
      }
    </script>
  </body>
</html>
